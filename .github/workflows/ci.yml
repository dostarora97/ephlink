name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build + vet
        run: |
          go build ./...
          go vet ./...
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then echo "unformatted:"; echo "$unformatted"; exit 1; fi
      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
